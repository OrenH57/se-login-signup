<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signup - SE Login Signup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="card">
        <h1 class="title">Signup</h1>
        <form class="form" action="#" method="post" novalidate>
          <label for="first-name">First name</label>
          <input id="first-name" name="firstName" type="text" placeholder="First name" required />

          <label for="last-name">Last name</label>
          <input id="last-name" name="lastName" type="text" placeholder="Last name" required />

          <label for="userid-signup">User ID</label>
          <input id="userid-signup" name="userid" type="text" placeholder="choose a user id" required />

          <label for="password-signup">Password</label>
          <input id="password-signup" name="password" type="password" placeholder="create a password" required />

          <button type="submit" class="btn">Create account</button>
        </form>

        <p class="muted">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </main>
  </body>
</html>
