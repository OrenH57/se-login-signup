<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — SE Login Signup</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="card">
        <h1 class="title">Login</h1>
        <form class="form" action="#" method="post" novalidate>
          <label for="userid-login">User ID</label>
          <input id="userid-login" name="userid" type="text" required />

          <label for="password-login">Password</label>
          <input id="password-login" name="password" type="password" placeholder="your password" required />

          <button type="submit" class="btn">Sign in</button>
        </form>

        <p class="muted">Don’t have an account? <a href="signup.html">Create one</a></p>
      </div>
    </main>
  </body>
</html>
